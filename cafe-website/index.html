<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Journey</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo"><i class="fas fa-coffee"></i> CafeFinder</div>
        <nav>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">GALLERY</a></li>
                <li><a href="#">EVENT</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </nav>
        <a href="#" class="btn-login">LOGIN</a>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1 class="gradient-text">Coffee Journey<br>never ends</h1>
            <p>Explore the most unique and aesthetic cafes around the world. Discover your next favorite spot to relax, work, and enjoy a perfect cup of coffee.</p>
            <a href="#" class="btn-outline">EXPLORE MORE</a>
            
            <div class="social-icons">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <div class="hero-image">
            <img src="assets/hero.png" alt="Surreal Coffee Art">
            <div class="date-badge">
                <span class="day">15</span>
                <span class="month">May</span>
                <span class="year">2026</span>
                <div class="plus-icon"><i class="fas fa-plus"></i></div>
            </div>
        </div>
    </main>
</body>
</html>
